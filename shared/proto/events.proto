syntax = "proto3";
package autonomy;

message EventProto {
    uint64 tick = 1;
    oneof event {
        EntitySpawnedEvent entity_spawned = 2;
        EntityDiedEvent entity_died = 3;
        EntityMovedEvent entity_moved = 4;
        EntityAteEvent entity_ate = 5;
        EntityReproducedEvent entity_reproduced = 6;
        ResourceDepletedEvent resource_depleted = 7;
    }
}

message EntitySpawnedEvent {
    uint64 entity_id = 1;
    double x = 2;
    double y = 3;
    uint32 generation = 4;
    uint64 parent_id = 5;
    bool has_parent = 6;
}

message EntityDiedEvent {
    uint64 entity_id = 1;
    double x = 2;
    double y = 3;
    uint64 age = 4;
    string cause = 5;
}

message EntityMovedEvent {
    uint64 entity_id = 1;
    double from_x = 2;
    double from_y = 3;
    double to_x = 4;
    double to_y = 5;
}

message EntityAteEvent {
    uint64 entity_id = 1;
    uint64 resource_id = 2;
    double energy_gained = 3;
}

message EntityReproducedEvent {
    uint64 parent_id = 1;
    uint64 offspring_id = 2;
    double x = 3;
    double y = 4;
}

message ResourceDepletedEvent {
    uint64 resource_id = 1;
    double x = 2;
    double y = 3;
}
